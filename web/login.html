<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volo Index — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="/Assets/volo-icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/Assets/favicon-32.png">
  <style>
    :root {
      --primary:    #b0542c;
      --primary-dk: #7a2e10;
      --secondary:  #cd8a4f;
      --light:      #e0d4c0;
      --lighter:    #ede5d8;
      --bg:         #faf9f5;
      --paper:      #f4efe5;
      --text:       #2c1d13;
      --muted:      #7a6252;
      --white:      #ffffff;
      --green:      #3d7a4a;
      --shadow:     0 2px 16px rgba(44,29,19,.09);
      --r:          12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      gap: 28px;
      line-height: 1.5;
    }

    /* ── Screen switcher ── */
    .screen { display: none; width: 100%; max-width: 420px; flex-direction: column; align-items: center; gap: 24px; }
    .screen.active { display: flex; }

    /* ── Logo ── */
    .logo-mark svg { display: block; }
    .logo-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-top: 10px;
    }

    /* ── Card ── */
    .card {
      background: var(--white);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      padding: 40px;
      width: 100%;
    }
    .card h1 { font-size: 21px; font-weight: 700; margin-bottom: 10px; }
    .card .desc { font-size: 14px; color: var(--muted); margin-bottom: 26px; line-height: 1.65; }

    /* ── Form fields ── */
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .4px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--lighter);
      border-radius: 8px;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    .field input:focus { border-color: var(--secondary); }

    /* ── Button ── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background .15s, opacity .15s;
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-dk); }
    .btn-primary:disabled { opacity: .45; cursor: default; }

    /* ── Error message ── */
    .error-msg {
      background: #fdecea;
      color: #c0392b;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
      line-height: 1.5;
    }

    /* ── Sent state ── */
    .check-icon {
      width: 56px; height: 56px;
      background: #edf7ee;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .sent-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; text-align: center; }
    .sent-desc  { font-size: 14px; color: var(--muted); line-height: 1.65; text-align: center; }
    .sent-email { font-weight: 600; color: var(--text); }
    .retry-link {
      background: none; border: none;
      color: var(--primary); cursor: pointer;
      font-size: 13px; padding: 0;
      text-decoration: underline; text-underline-offset: 2px;
      font-family: inherit;
    }
    .retry-link:hover { color: var(--primary-dk); }

    /* ── Footer ── */
    .footnote { font-size: 12px; color: var(--muted); text-align: center; }
    .footnote a { color: var(--primary); text-decoration: none; }
    .footnote a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- ══ SIGN-IN FORM ══════════════════════════════════════════════════════════ -->
<div id="s-form" class="screen active">
  <div class="logo-mark">
    <svg viewBox="0 0 160 100" width="160" height="100" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 80 A70 70 0 0 1 150 80" fill="none" stroke="#e0d4c0" stroke-width="10" stroke-linecap="round"/>
      <path d="M33 80 A47 47 0 0 1 127 80" fill="none" stroke="#cd8a4f" stroke-width="10" stroke-linecap="round"/>
      <path d="M56 80 A24 24 0 0 1 104 80" fill="none" stroke="#b0542c" stroke-width="10" stroke-linecap="round"/>
      <circle cx="80" cy="80" r="10" fill="#b0542c"/>
    </svg>
    <div class="logo-name">Volo Index</div>
  </div>

  <div class="card">
    <h1>Sign in</h1>
    <p class="desc">Enter your email address and we'll send you a sign-in link. No password needed.</p>

    <div class="field">
      <label for="email-input">Email address</label>
      <input id="email-input" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <button id="btn-submit" class="btn-primary">Send sign-in link</button>
    <div id="error-msg" class="error-msg"></div>
  </div>

  <p class="footnote"><a href="/">← Back to Volo Index</a></p>
</div>

<!-- ══ CHECK YOUR EMAIL ═══════════════════════════════════════════════════════ -->
<div id="s-sent" class="screen">
  <div class="logo-mark">
    <svg viewBox="0 0 160 100" width="160" height="100" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 80 A70 70 0 0 1 150 80" fill="none" stroke="#e0d4c0" stroke-width="10" stroke-linecap="round"/>
      <path d="M33 80 A47 47 0 0 1 127 80" fill="none" stroke="#cd8a4f" stroke-width="10" stroke-linecap="round"/>
      <path d="M56 80 A24 24 0 0 1 104 80" fill="none" stroke="#b0542c" stroke-width="10" stroke-linecap="round"/>
      <circle cx="80" cy="80" r="10" fill="#b0542c"/>
    </svg>
    <div class="logo-name">Volo Index</div>
  </div>

  <div class="card">
    <div class="check-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#3d7a4a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <p class="sent-title">Check your email</p>
    <p class="sent-desc" style="margin-bottom:12px">
      We sent a sign-in link to <span id="sent-email" class="sent-email"></span>.
      Click the link in the email to sign in.
    </p>
    <p class="sent-desc" style="font-size:12px">
      Didn't receive it? Check your spam folder, or&nbsp;<button id="btn-retry" class="retry-link">try a different email</button>.
    </p>
  </div>
</div>

<script>
(function () {
  // ── If already authenticated with a valid token, skip straight to /app ──
  try {
    const stored = localStorage.getItem('volo-access-token');
    if (stored) {
      const parts = stored.split('.');
      if (parts.length === 3) {
        const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
        if (!payload.exp || payload.exp > Math.floor(Date.now() / 1000)) {
          location.replace('/app');
        } else {
          localStorage.removeItem('volo-access-token');
        }
      }
    }
  } catch { /* malformed token — ignore, let user sign in fresh */ }

  // ── Screen helper ──
  function show(id) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── Form submission ──
  let lastEmail = '';

  async function submit() {
    const input = document.getElementById('email-input');
    const email = input.value.trim();

    if (!email || !email.includes('@') || email.length < 5) {
      showError('Please enter a valid email address.');
      input.focus();
      return;
    }

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    hideError();
    lastEmail = email;

    try {
      const r = await fetch('/auth/magic-link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await r.json().catch(() => ({}));

      if (!r.ok) {
        showError(data.error?.message || 'Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Send sign-in link';
        return;
      }

      document.getElementById('sent-email').textContent = email;
      show('s-sent');
    } catch {
      showError('Network error — check your connection and try again.');
      btn.disabled = false;
      btn.textContent = 'Send sign-in link';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error-msg').style.display = 'none';
  }

  // ── Event listeners ──
  document.getElementById('btn-submit').addEventListener('click', submit);
  document.getElementById('email-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submit();
  });

  document.getElementById('btn-retry').addEventListener('click', () => {
    show('s-form');
    const input = document.getElementById('email-input');
    input.value = lastEmail;
    const btn = document.getElementById('btn-submit');
    btn.disabled = false;
    btn.textContent = 'Send sign-in link';
    input.focus();
  });
})();
</script>
</body>
</html>
